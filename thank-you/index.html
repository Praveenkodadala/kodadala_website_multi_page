<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow">
  <title>Thank You | Kodadala Trading Company</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

 <style>
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8faf7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh; /* mobile safe */
    padding: 20px;
    text-align: center;
    color: #1f3d2b;
  }

  .container {
    max-width: 600px;
    width: 100%;
    padding: 40px 20px;
  }

  .logo {
    font-size: 38px;
    font-weight: 700;
    color: #1f3d2b;
    letter-spacing: 1px;
  }

  .logo-sub {
    color: #e67e22;
    font-weight: 500;
    margin-top: -5px;
    letter-spacing: 2px;
    font-size: 14px;
  }

  .check {
    width: 80px;
    height: 80px;
    background: #2e7d32;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 40px auto 20px;
    font-size: 40px;
    color: white;
    animation: pop 0.4s ease;
  }

  @keyframes pop {
    0% {
      transform: scale(0.6);
      opacity: 0;
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  h1 {
    font-size: 32px;
    margin-bottom: 10px;
  }

  p {
    color: #555;
    font-size: 16px;
    line-height: 1.6;
  }

  .btn {
  display: inline-block;
  margin-top: 30px;
  padding: 16px 30px;
  background: #2e7d32;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s ease;
  min-width: 200px;
  text-align: center;
}

.btn:hover {
  background: #256628;
}

.btn:active {
  transform: scale(0.96);
}

  /* Mobile tweaks */
  @media (max-width: 480px) {
    h1 {
      font-size: 26px;
    }

    .check {
      width: 70px;
      height: 70px;
      font-size: 32px;
    }

     .btn {
    display: block;
    width: 100%;
    padding: 16px;
    font-size: 16px;
  }
  }
</style>
</head>

<body>

  <div class="container">

    <!-- <div class="logo">KODADALA</div>
    <div class="logo-sub">TRADING COMPANY</div> -->

    <div class="check">✔</div>

    <h1>Thank You for Your Inquiry!</h1>

<p>
  We have received your request successfully.<br/>
  Our team will respond within <strong>24 hours</strong> with further details.
</p>

    <a href="/" class="btn">Back to Home</a>

  </div>

</body>
</html>
